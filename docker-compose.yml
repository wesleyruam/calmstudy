# name fixo desacopla o projeto (e os volumes) do nome da pasta —
# assim renomear a pasta não cria volumes novos vazios.
name: calmstudy

services:
  postgres:
    image: postgres:17-alpine
    container_name: calmstudy-postgres
    environment:
      POSTGRES_USER: calmstudy
      POSTGRES_PASSWORD: calmstudy
      POSTGRES_DB: calmstudy
    ports:
      - "5433:5432" # 5433 no host p/ não conflitar com Postgres local
    volumes:
      - calmstudy-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calmstudy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: calmstudy-redis
    ports:
      - "6380:6379" # 6380 no host p/ não conflitar com Redis local
    volumes:
      - calmstudy-redis:/data

  # Fase 2+: descomente quando entrar storage S3 e busca full-text.
