services:
  postgres:
    image: postgres:17-alpine
    container_name: calmbook-postgres
    environment:
      POSTGRES_USER: calmbook
      POSTGRES_PASSWORD: calmbook
      POSTGRES_DB: calmbook
    ports:
      - "5433:5432" # 5433 no host p/ não conflitar com Postgres local
    volumes:
      - calmbook-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calmbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: calmbook-redis
    ports:
      - "6380:6379" # 6380 no host p/ não conflitar com Redis local
    volumes:
      - calmbook-redis:/data

  # Fase 2+: descomente quando entrar storage S3 e busca full-text.
